<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Hassan Bookshop brand mark: editorial serif H with gold period
       on the evergreen gradient. Pure paths — no font dependencies. -->
